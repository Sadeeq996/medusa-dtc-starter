<section class="marketplace-vendors">
    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="mb-6 flex items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-semibold text-color">Medusa Marketplace</h1>
                <p class="text-muted-color mt-1">Browse vendors and their storefronts across the marketplace.</p>
            </div>
        </div>

        <div class="grid gap-4 sm:grid-cols-2 xl:grid-cols-3">
            @if (loading) {
            <div class="col-span-full rounded-lg border border-surface p-6 bg-surface">
                <p class="text-sm text-muted-color">Loading marketplace vendors...</p>
            </div>
            } @else {
            @for (const vendor of vendors; track vendor.id) {
            <article
                class="rounded-3xl border border-surface bg-white p-6 shadow-sm transition-shadow duration-200 hover:shadow-lg">
                <div class="flex items-center gap-4 mb-4">
                    <div class="h-16 w-16 rounded-3xl bg-surface overflow-hidden flex items-center justify-center">
                        <img src="{{ vendor.logo }}" alt="{{ vendor.name }} logo" class="h-full w-full object-cover" />
                    </div>
                    <div>
                        <h2 class="text-xl font-semibold text-color">{{ vendor.name }}</h2>
                        <p class="text-sm text-muted-color">{{ vendor.productCount }} products</p>
                    </div>
                </div>
                <p class="text-sm text-muted-color mb-6">{{ vendor.description }}</p>
                <p-button label="View Store" icon="pi pi-external-link" severity="primary"
                    (click)="navigateToVendor(vendor.handle)">
                </p-button>
            </article>
            }
            }
        </div>
    </div>
</section>
